set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# set -g @plugin 'jimeh/tmux-themepack'
# set -g @themepack 'powerline/block/blue'

# set -g @plugin 'pawmot/nightfox-tmux'
# set -g @nightfox_style 'terafox'

# rose-pine setup
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'

set -g @rose_pine_host 'off'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%I:%M < %d-%m-%Y'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_default_window_behavior 'on'

set -g @rose_pine_window_status_separator '   '
set -g @rose_pine_left_separator ' > '
set -g @rose_pine_right_separator ' < '
set -g @rose_pine_field_separator ' | '
set -g @rose_pine_window_separator ' - '

set -g @rose_pine_session_icon ' ' 
set -g @rose_pine_current_window_icon ' '
set -g @rose_pine_folder_icon ' ' 
set -g @rose_pine_username_icon ' ' 
set -g @rose_pine_hostname_icon '󰒋 ' 
set -g @rose_pine_date_time_icon '󰃰 '

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

unbind n
bind -n M-l next-window
unbind p
bind -n M-h previous-window

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -g mouse on

run '~/.tmux/plugins/tpm/tpm'
